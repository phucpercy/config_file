# Terminal identification
term xterm-kitty

# Font settings
font_size 20.0

# Font positioning (Alacritty's glyph_offset and offset)
# Kitty uses modify_font for adjustments
modify_font cell_width 101%
modify_font cell_height 101%
modify_font baseline 1

# Scrollback
scrollback_lines 10000
wheel_scroll_multiplier 3.0

# Window settings
window_padding_width 3

# Remove decorations and start fullscreen
hide_window_decorations yes

# Start in fullscreen (add this to launch in fullscreen)
# Note: Kitty doesn't have a config option for startup fullscreen
# Use: kitty --start-as=fullscreen
# Or press Cmd+Ctrl+F after launching

# Ayu Light theme colors
# (converted from ayu_light theme)
foreground #5c6166
background #fafafa
selection_foreground #5c6166
selection_background #f0eee4

cursor #ff9940
cursor_text_color #fafafa

# Normal colors
color0 #000000
color1 #ff3333
color2 #86b300
color3 #f29718
color4 #41a6d9
color5 #f07178
color6 #4dbf99
color7 #ffffff

# Bright colors
color8 #323232
color9 #ff6565
color10 #b8e532
color11 #ffc94a
color12 #73d8ff
color13 #ffa3aa
color14 #7ff0cb
color15 #ffffff

# URL styling
url_color #41a6d9
url_style curly

# Cursor
cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 15.0

# Mouse
mouse_hide_wait 3.0
copy_on_select yes

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes

# Bell
enable_audio_bell no
visual_bell_duration 0.0

# Tab bar (if you use tabs)
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
